version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: sales_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: sales_data
      MYSQL_USER: sales_user
      MYSQL_PASSWORD: sales_secure_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically initialize database schema when container starts
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sales_user", "-psales_secure_password"]
      timeout: 5s
      retries: 5
      interval: 10s
    restart: always

  etl-pipeline:
    build: .
    container_name: sales_etl_runner
    depends_on:
      mysql-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=mysql-db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: "no"

volumes:
  mysql_data:
